# Project-wide Gradle settings.

# JVM args for the Gradle daemon. Raised to 3072m after DEBUG Kotlin OOM on 2048m (sole-Gradle evening).
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
kotlin.daemon.jvmargs=-Xmx2048m
org.gradle.java.home=C\:\\Users\\Gilbert\\.jdks\\jbr-17.0.14

# Run independent tasks in parallel where the module graph allows.
org.gradle.parallel=false

# Reuse outputs from previous builds.
org.gradle.caching=true

# Only configure projects relevant to the requested task.
org.gradle.configureondemand=true

# AndroidX is required (Compose, Room, lifecycle all depend on it).
android.useAndroidX=true

# Kotlin code style for the IDE.
kotlin.code.style=official

# R8 full mode for release builds. (Moot while release ships unminified Ã¢â‚¬â€ see build.gradle.kts.)
android.enableR8.fullMode=true

# Only keep the resources for the configurations actually used (smaller APK).
android.nonTransitiveRClass=true
