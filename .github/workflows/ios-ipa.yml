# Unsigned iOS IPA for AltStore / SideStore â€” does NOT rebuild Android.
#
# Use this from Windows when Mac xcodebuild is unavailable, after source is on
# Newbbsss/noop-public-release. Attaches NOOP-ios-unsigned-v*.ipa to an existing release
# tag (default v8.6.164-fable) without clobbering the MAIN APK via fork-release.
name: iOS IPA (unsigned)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version stamp in IPA filename (e.g. 8.6.164-fable)"
        required: true
        default: "8.6.241-fable"
      release_tag:
        description: "Existing GitHub release tag to attach the IPA (blank = testing-latest)"
        required: false
        default: "v8.6.241-fable"

permissions:
  contents: write

concurrency:
  group: ios-ipa
  cancel-in-progress: false

jobs:
  ios:
    # iOS 26 Liquid Glass needs the iOS 26 SDK â†’ Xcode 26 â†’ macos-26 (matches fork-release).
    runs-on: macos-26
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen generate
      - name: Build NOOPiOS for device (unsigned, Release)
        run: >-
          xcodebuild -scheme NOOPiOS -configuration Release -destination 'generic/platform=iOS'
          -derivedDataPath build/dd
          CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=""
          build
      - name: Package unsigned .ipa + attach to release
        env:
          GH_TOKEN: ${{ github.token }}
          VER: ${{ github.event.inputs.version }}
          TAG: ${{ github.event.inputs.release_tag }}
        run: |
          set -euo pipefail
          APP=$(find build/dd/Build/Products/Release-iphoneos -maxdepth 1 -name '*.app' -type d | head -1)
          test -n "$APP" || { echo ".app (iphoneos) not found"; exit 1; }
          rm -rf "$APP/Watch"
          rm -rf Payload && mkdir Payload && cp -R "$APP" Payload/
          IPA="NOOP-ios-unsigned-v${VER}.ipa"
          zip -qr "$IPA" Payload
          if [ -z "${TAG:-}" ]; then
            TAG="testing-latest"
          fi
          if ! gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --prerelease \
              --title "NOOP iOS IPA ${VER}" \
              --notes "Unsigned iOS IPA for AltStore / SideStore (Gilbert). Android APK unchanged."
          fi
          gh release upload "$TAG" "$IPA" --repo "$GITHUB_REPOSITORY" --clobber
          echo "Uploaded $IPA â†’ https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/${IPA}"
